<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>교실 폭탄 돌리기</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jua&display=swap">
  <style>
    :root {
      --bg-1: #fff8dc;
      --bg-2: #ffd7ba;
      --bg-3: #ffeef6;
      --ink: #2f2a44;
      --card: rgba(255, 255, 255, 0.82);
      --shadow: rgba(47, 42, 68, 0.18);
      --accent: #ff7f50;
      --accent-2: #ffcf4d;
      --danger: #ff5f5f;
      --mint: #62d2a2;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Jua", sans-serif;
      background: linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 55%, var(--bg-3) 100%);
      color: var(--ink);
      overflow: hidden;
    }

    body {
      position: relative;
    }

    .stage-shell {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .decor-layer,
    .boom-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .decor {
      position: absolute;
      top: -12vh;
      opacity: 0.72;
      animation: float-drop linear infinite;
      transform-origin: center;
    }

    .decor svg {
      display: block;
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 6px 10px rgba(47, 42, 68, 0.1));
    }

    @keyframes float-drop {
      0% {
        transform: translate3d(0, -15vh, 0) rotate(0deg);
      }
      25% {
        transform: translate3d(8px, 15vh, 0) rotate(15deg);
      }
      50% {
        transform: translate3d(-10px, 40vh, 0) rotate(-12deg);
      }
      75% {
        transform: translate3d(12px, 70vh, 0) rotate(18deg);
      }
      100% {
        transform: translate3d(-6px, 120vh, 0) rotate(-8deg);
      }
    }

    .panel {
      position: relative;
      width: min(92vw, 540px);
      padding: 30px 28px;
      border-radius: 34px;
      background: var(--card);
      backdrop-filter: blur(10px);
      box-shadow: 0 24px 50px var(--shadow);
      border: 4px solid rgba(255, 255, 255, 0.68);
      text-align: center;
      z-index: 2;
    }

    h1, h2, p {
      margin: 0;
    }

    .title {
      font-size: clamp(2.2rem, 5vw, 3.6rem);
      line-height: 1;
      letter-spacing: 0.02em;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: clamp(1rem, 2.2vw, 1.25rem);
      color: rgba(47, 42, 68, 0.74);
      margin-bottom: 26px;
    }

    .inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 14px;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 1.1rem;
      text-align: left;
    }

    input[type="number"] {
      width: 100%;
      border: 3px solid #ffd27c;
      border-radius: 18px;
      padding: 14px 16px;
      font: inherit;
      font-size: 1.2rem;
      color: var(--ink);
      background: rgba(255, 251, 240, 0.95);
      outline: none;
      transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
    }

    input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 6px rgba(255, 127, 80, 0.18);
      transform: translateY(-1px);
    }

    .warning {
      min-height: 28px;
      margin-bottom: 14px;
      color: #ff4b77;
      font-size: 1rem;
      line-height: 1.4;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 28px;
      font: inherit;
      font-size: 1.2rem;
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, filter 140ms ease;
      box-shadow: 0 10px 20px rgba(47, 42, 68, 0.16);
    }

    button:hover {
      transform: translateY(-2px) scale(1.01);
      filter: brightness(1.03);
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    .start-btn {
      background: linear-gradient(180deg, #ffd95a 0%, #ff9f5a 100%);
      color: #5a2d00;
    }

    .stop-btn {
      background: linear-gradient(180deg, #fff 0%, #ffe4ec 100%);
      color: #9b3153;
    }

    .stage {
      display: none;
      position: relative;
      z-index: 2;
      width: 100%;
      min-height: 100vh;
      align-items: center;
      justify-items: center;
    }

    .stage.active {
      display: grid;
    }

    .game-wrap {
      width: min(92vw, 740px);
      display: grid;
      gap: 24px;
      justify-items: center;
      text-align: center;
    }

    .bomb-shell {
      width: min(75vw, 340px);
      filter: drop-shadow(0 30px 30px rgba(47, 42, 68, 0.22));
      transform-origin: center 72%;
      transition: transform 120ms ease;
    }

    .bomb-shell.shake {
      animation: bomb-burst 360ms cubic-bezier(.2,.8,.2,1);
    }

    @keyframes bomb-burst {
      0% { transform: translateX(0) rotate(0deg) scale(1); }
      14% { transform: translateX(-16px) rotate(-8deg) scale(1.06); }
      28% { transform: translateX(18px) rotate(9deg) scale(1.09); }
      45% { transform: translateX(-10px) rotate(-6deg) scale(1.03); }
      60% { transform: translateX(13px) rotate(5deg) scale(1.08); }
      82% { transform: translateX(-4px) rotate(-2deg) scale(1.01); }
      100% { transform: translateX(0) rotate(0deg) scale(1); }
    }

    .suspense {
      min-height: 44px;
      width: min(90vw, 520px);
      font-size: clamp(1.2rem, 2.8vw, 1.6rem);
      color: rgba(47, 42, 68, 0.86);
      text-shadow: 0 2px 0 rgba(255,255,255,0.3);
      animation: suspense-pop 320ms ease;
    }

    @keyframes suspense-pop {
      0% { transform: translateY(8px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    .boom-overlay {
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.82) 0 10%, rgba(255, 222, 89, 0.78) 18%, rgba(255, 109, 61, 0.54) 34%, rgba(255, 74, 74, 0.14) 58%, rgba(255,255,255,0) 75%);
      opacity: 0;
      visibility: hidden;
      transition: opacity 180ms ease, visibility 180ms ease;
      z-index: 3;
    }

    .boom-overlay.active {
      opacity: 1;
      visibility: visible;
      animation: screen-rattle 420ms linear 4;
    }

    .boom-core {
      display: grid;
      place-items: center;
      transform: scale(0.2);
      opacity: 0;
    }

    .boom-overlay.active .boom-core {
      animation: boom-pop 500ms cubic-bezier(.18,1,.32,1) forwards;
    }

    @keyframes boom-pop {
      0% { transform: scale(0.2) rotate(-18deg); opacity: 0; }
      60% { transform: scale(1.22) rotate(6deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    @keyframes screen-rattle {
      0% { transform: translate(0, 0); }
      25% { transform: translate(-12px, 8px); }
      50% { transform: translate(14px, -6px); }
      75% { transform: translate(-10px, -8px); }
      100% { transform: translate(0, 0); }
    }

    .boom-text {
      position: absolute;
      font-size: clamp(4rem, 14vw, 8rem);
      color: #fffef3;
      text-shadow:
        0 4px 0 #ff7a29,
        0 10px 24px rgba(125, 34, 0, 0.38);
      letter-spacing: 0.08em;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 640px) {
      .panel {
        padding: 24px 18px;
        border-radius: 28px;
      }

      .inputs {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }

      .button-row {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="stage-shell">
    <div class="decor-layer" id="decorLayer" aria-hidden="true"></div>

    <section class="stage active" id="setupStage" aria-label="설정 화면">
      <div class="panel">
        <h1 class="title">폭탄 돌리기</h1>
        <p class="subtitle">교실에서 바로 시작하는 두근두근 랜덤 타이머</p>
        <div class="inputs">
          <label>
            최소 시간(초)
            <input id="minTime" type="number" min="1" step="1" inputmode="numeric" value="10">
          </label>
          <label>
            최대 시간(초)
            <input id="maxTime" type="number" min="1" step="1" inputmode="numeric" value="30">
          </label>
        </div>
        <div class="warning" id="warningText" aria-live="polite"></div>
        <div class="button-row">
          <button class="start-btn" id="startButton" type="button">시작!</button>
        </div>
      </div>
    </section>

    <section class="stage" id="playStage" aria-label="폭탄 동작 화면">
      <div class="game-wrap">
        <div class="bomb-shell" id="bombShell" aria-hidden="true"></div>
        <div class="suspense" id="suspenseText" aria-live="polite"></div>
        <div class="button-row">
          <button class="stop-btn" id="stopButton" type="button">그만하기</button>
        </div>
      </div>
    </section>

    <section class="stage" id="boomStage" aria-label="폭발 화면">
      <div class="sr-only" aria-live="assertive">펑!</div>
    </section>

    <div class="boom-overlay" id="boomOverlay" aria-hidden="true">
      <div class="boom-core" id="boomCore"></div>
      <div class="boom-text">펑!</div>
    </div>
  </div>

  <script>
    const stages = {
      setup: document.getElementById("setupStage"),
      play: document.getElementById("playStage"),
      boom: document.getElementById("boomStage")
    };
    const minInput = document.getElementById("minTime");
    const maxInput = document.getElementById("maxTime");
    const warningText = document.getElementById("warningText");
    const startButton = document.getElementById("startButton");
    const stopButton = document.getElementById("stopButton");
    const bombShell = document.getElementById("bombShell");
    const suspenseText = document.getElementById("suspenseText");
    const decorLayer = document.getElementById("decorLayer");
    const boomOverlay = document.getElementById("boomOverlay");
    const boomCore = document.getElementById("boomCore");

    const suspenseLines = [
      "누구 손에서 펑 하고 터질까?",
      "조금 전엔 조용했는데... 지금은 아닐지도!",
      "도화선이 반짝일수록 마음은 콩닥콩닥!",
      "폭탄이 얌전한 척하는 게 더 수상해!",
      "다음 차례가 오기 전에 끝날 수도 있어!",
      "한 번 더 넘어가면 안심일까? 글쎄!",
      "교실 공기가 슬쩍 긴장으로 꽉 찼어요!",
      "방금 흔들린 거 봤지? 나만 본 거 아니지?"
    ];

    const state = {
      stage: "setup",
      audioContext: null,
      tickIntervalId: null,
      finishTimeoutId: null,
      stopRequested: false,
      surpriseTimeoutId: null,
      shakeTimeoutId: null,
      suspenseIntervalId: null,
      sparkIntervalId: null,
      activeTickIsHigh: true
    };

    function showStage(name) {
      Object.entries(stages).forEach(([key, node]) => {
        node.classList.toggle("active", key === name);
      });
      state.stage = name;
    }

    function validateInputs() {
      const min = Number(minInput.value);
      const max = Number(maxInput.value);
      let message = "";

      if (!Number.isInteger(min) || !Number.isInteger(max) || min < 1 || max < 1) {
        message = "초는 1 이상 정수로 넣어 주세요. 폭탄도 숫자는 정확히 셉니다!";
      } else if (min >= max) {
        message = "최소 시간은 최대 시간보다 작아야 해요. 안 그러면 폭탄이 삐질지도 몰라요!";
      }

      warningText.textContent = message;
      return message === "" ? { min, max } : null;
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function pickRandom(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function renderBombSvg() {
      bombShell.innerHTML = `
        <svg viewBox="0 0 320 320" role="img" aria-label="폭탄 캐릭터">
          <defs>
            <radialGradient id="bodyGloss" cx="35%" cy="28%" r="70%">
              <stop offset="0%" stop-color="#5b5965"></stop>
              <stop offset="42%" stop-color="#23212c"></stop>
              <stop offset="100%" stop-color="#0f0f14"></stop>
            </radialGradient>
            <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
              <feMerge>
                <feMergeNode in="blur"></feMergeNode>
                <feMergeNode in="SourceGraphic"></feMergeNode>
              </feMerge>
            </filter>
          </defs>
          <g id="fuseGroup">
            <path d="M178 74 C194 36, 240 26, 257 48 C272 66, 264 83, 256 92" fill="none" stroke="#734a28" stroke-width="10" stroke-linecap="round"></path>
            <path d="M180 74 C194 42, 234 34, 249 51 C259 63, 256 76, 251 84" fill="none" stroke="#b27842" stroke-width="4" stroke-linecap="round"></path>
            <g id="sparkGroup" transform="translate(257 92)">
              <g id="sparkRays" fill="#ffc928" stroke="#ff8d22" stroke-width="2"></g>
              <circle r="12" fill="#ffd94d" filter="url(#softGlow)"></circle>
              <circle r="7" fill="#ff8a24"></circle>
              <circle r="3" fill="#fff4c7"></circle>
            </g>
          </g>
          <g id="bombFace">
            <circle cx="160" cy="180" r="104" fill="url(#bodyGloss)"></circle>
            <ellipse cx="127" cy="130" rx="42" ry="25" fill="rgba(255,255,255,0.18)" transform="rotate(-24 127 130)"></ellipse>
            <ellipse cx="126" cy="164" rx="30" ry="38" fill="#fffdf8"></ellipse>
            <ellipse cx="194" cy="164" rx="30" ry="38" fill="#fffdf8"></ellipse>
            <g id="normalFace">
              <circle cx="132" cy="171" r="12" fill="#17151d"></circle>
              <circle cx="199" cy="171" r="12" fill="#17151d"></circle>
              <circle cx="127" cy="165" r="3.5" fill="#ffffff"></circle>
              <circle cx="194" cy="165" r="3.5" fill="#ffffff"></circle>
              <path d="M138 218 Q160 236 182 218" fill="none" stroke="#ffb1b1" stroke-width="7" stroke-linecap="round"></path>
            </g>
            <g id="surprisedFace" visibility="hidden">
              <circle cx="132" cy="168" r="16" fill="#17151d"></circle>
              <circle cx="199" cy="168" r="16" fill="#17151d"></circle>
              <circle cx="125" cy="160" r="4.2" fill="#ffffff"></circle>
              <circle cx="192" cy="160" r="4.2" fill="#ffffff"></circle>
              <ellipse cx="166" cy="222" rx="17" ry="20" fill="#ffb1b1"></ellipse>
            </g>
            <ellipse cx="164" cy="256" rx="62" ry="14" fill="rgba(0,0,0,0.22)"></ellipse>
          </g>
        </svg>
      `;

      renderSparkRays(10);
    }

    function renderSparkRays(count) {
      const sparkRays = bombShell.querySelector("#sparkRays");
      if (!sparkRays) return;
      let markup = "";
      for (let i = 0; i < count; i += 1) {
        const angle = (360 / count) * i;
        const outer = 18 + Math.random() * 8;
        const width = 4 + Math.random() * 5;
        markup += `
          <path transform="rotate(${angle})" d="M0,-11 L${width / 2},-${outer} L0,-${outer - 7} L-${width / 2},-${outer} Z"></path>
        `;
      }
      sparkRays.innerHTML = markup;
    }

    function renderBoomSvg() {
      const rays = randomInt(9, 12);
      let markup = "";
      for (let i = 0; i < rays; i += 1) {
        const angle = (360 / rays) * i;
        const outer = 128 + Math.random() * 42;
        const inner = 72 + Math.random() * 22;
        const width = 16 + Math.random() * 12;
        const color = ["#ffe55a", "#ff9c33", "#ff5f38"][i % 3];
        markup += `<path transform="rotate(${angle} 160 160)" d="M160 ${160 - inner} L${160 + width} ${160 - outer} L160 ${160 - outer + 28} L${160 - width} ${160 - outer} Z" fill="${color}"></path>`;
      }
      boomCore.innerHTML = `
        <svg viewBox="0 0 320 320" width="340" height="340" aria-hidden="true">
          ${markup}
          <circle cx="160" cy="160" r="82" fill="#fff38b"></circle>
          <circle cx="160" cy="160" r="60" fill="#ff9b2d"></circle>
          <circle cx="160" cy="160" r="40" fill="#ff5e37"></circle>
        </svg>
      `;
    }

    function createDecor() {
      const types = ["star", "heart", "circle"];
      let markup = "";
      const count = randomInt(10, 15);
      for (let i = 0; i < count; i += 1) {
        const type = pickRandom(types);
        const size = 24 + Math.random() * 34;
        const left = Math.random() * 100;
        const duration = 9 + Math.random() * 8;
        const delay = -Math.random() * 12;
        const opacity = 0.4 + Math.random() * 0.45;
        markup += `
          <div class="decor" style="left:${left}%; width:${size}px; height:${size}px; animation-duration:${duration}s; animation-delay:${delay}s; opacity:${opacity}">
            ${decorSvg(type)}
          </div>
        `;
      }
      decorLayer.innerHTML = markup;
    }

    function decorSvg(type) {
      if (type === "heart") {
        return `
          <svg viewBox="0 0 64 64">
            <path d="M32 55 C18 45, 8 36, 8 23 C8 14, 15 8, 23 8 C28 8, 31 11, 32 14 C33 11, 36 8, 41 8 C49 8, 56 14, 56 23 C56 36, 46 45, 32 55 Z" fill="#ff8aa8"></path>
          </svg>
        `;
      }
      if (type === "circle") {
        return `
          <svg viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="21" fill="#7fd6c2"></circle>
            <circle cx="25" cy="25" r="7" fill="rgba(255,255,255,0.45)"></circle>
          </svg>
        `;
      }
      return `
        <svg viewBox="0 0 64 64">
          <path d="M32 6 L38 22 L56 22 L42 33 L47 51 L32 40 L17 51 L22 33 L8 22 L26 22 Z" fill="#ffd552"></path>
        </svg>
      `;
    }

    function ensureAudioContext() {
      if (!state.audioContext) {
        state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (state.audioContext.state === "suspended") {
        state.audioContext.resume();
      }
      return state.audioContext;
    }

    function createNoiseBuffer(context, durationSeconds) {
      const length = Math.max(1, Math.floor(context.sampleRate * durationSeconds));
      const buffer = context.createBuffer(1, length, context.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < length; i += 1) {
        data[i] = Math.random() * 2 - 1;
      }
      return buffer;
    }

    function playTick() {
      const context = ensureAudioContext();
      const now = context.currentTime;
      const noise = context.createBufferSource();
      noise.buffer = createNoiseBuffer(context, 0.08);

      const primaryFilter = context.createBiquadFilter();
      const secondaryFilter = context.createBiquadFilter();
      const gain = context.createGain();

      if (state.activeTickIsHigh) {
        primaryFilter.type = "highpass";
        primaryFilter.frequency.value = 2200;
        secondaryFilter.type = "bandpass";
        secondaryFilter.frequency.value = 3100;
        secondaryFilter.Q.value = 1.4;
        gain.gain.setValueAtTime(0.001, now);
        gain.gain.exponentialRampToValueAtTime(0.24, now + 0.004);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
      } else {
        primaryFilter.type = "lowpass";
        primaryFilter.frequency.value = 1200;
        secondaryFilter.type = "highpass";
        secondaryFilter.frequency.value = 420;
        secondaryFilter.Q.value = 0.9;
        gain.gain.setValueAtTime(0.001, now);
        gain.gain.exponentialRampToValueAtTime(0.32, now + 0.006);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.085);
      }

      noise.connect(primaryFilter);
      primaryFilter.connect(secondaryFilter);
      secondaryFilter.connect(gain);
      gain.connect(context.destination);
      noise.start(now);
      noise.stop(now + 0.09);
      state.activeTickIsHigh = !state.activeTickIsHigh;
    }

    function playExplosion() {
      const context = ensureAudioContext();
      const now = context.currentTime;

      const master = context.createGain();
      master.gain.setValueAtTime(0.0001, now);
      master.gain.exponentialRampToValueAtTime(0.95, now + 0.02);
      master.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
      master.connect(context.destination);

      const noise = context.createBufferSource();
      noise.buffer = createNoiseBuffer(context, 1.5);
      const band = context.createBiquadFilter();
      band.type = "bandpass";
      band.frequency.setValueAtTime(520, now);
      band.Q.value = 0.6;
      const noiseGain = context.createGain();
      noiseGain.gain.setValueAtTime(0.001, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.8, now + 0.015);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
      noise.connect(band);
      band.connect(noiseGain);
      noiseGain.connect(master);

      const osc = context.createOscillator();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(80, now);
      osc.frequency.exponentialRampToValueAtTime(34, now + 1.1);
      const oscGain = context.createGain();
      oscGain.gain.setValueAtTime(0.001, now);
      oscGain.gain.exponentialRampToValueAtTime(0.7, now + 0.02);
      oscGain.gain.exponentialRampToValueAtTime(0.001, now + 1.25);
      osc.connect(oscGain);
      oscGain.connect(master);

      const rumble = context.createOscillator();
      rumble.type = "sine";
      rumble.frequency.setValueAtTime(46, now);
      rumble.frequency.exponentialRampToValueAtTime(22, now + 1.4);
      const rumbleGain = context.createGain();
      rumbleGain.gain.setValueAtTime(0.001, now);
      rumbleGain.gain.exponentialRampToValueAtTime(0.32, now + 0.06);
      rumbleGain.gain.exponentialRampToValueAtTime(0.001, now + 1.45);
      rumble.connect(rumbleGain);
      rumbleGain.connect(master);

      noise.start(now);
      noise.stop(now + 1.5);
      osc.start(now);
      osc.stop(now + 1.3);
      rumble.start(now);
      rumble.stop(now + 1.5);
    }

    function setNormalFace() {
      const normalFace = bombShell.querySelector("#normalFace");
      const surprisedFace = bombShell.querySelector("#surprisedFace");
      if (!normalFace || !surprisedFace) return;
      normalFace.setAttribute("visibility", "visible");
      surprisedFace.setAttribute("visibility", "hidden");
    }

    function flashSurprisedFace() {
      if (state.stage !== "play") return;
      const normalFace = bombShell.querySelector("#normalFace");
      const surprisedFace = bombShell.querySelector("#surprisedFace");
      if (!normalFace || !surprisedFace) return;
      normalFace.setAttribute("visibility", "hidden");
      surprisedFace.setAttribute("visibility", "visible");
      clearTimeout(state.surpriseTimeoutId);
      state.surpriseTimeoutId = setTimeout(setNormalFace, 180 + Math.random() * 260);
    }

    function pulseSpark() {
      const sparkGroup = bombShell.querySelector("#sparkGroup");
      if (!sparkGroup) return;
      const scale = 0.82 + Math.random() * 0.7;
      const rotate = -18 + Math.random() * 36;
      sparkGroup.setAttribute("transform", `translate(257 92) scale(${scale.toFixed(2)}) rotate(${rotate.toFixed(1)})`);
      if (Math.random() > 0.6) {
        renderSparkRays(randomInt(8, 12));
      }
    }

    function scheduleBombShake() {
      clearTimeout(state.shakeTimeoutId);
      if (state.stage !== "play") return;
      state.shakeTimeoutId = setTimeout(() => {
        bombShell.classList.remove("shake");
        void bombShell.offsetWidth;
        bombShell.classList.add("shake");
        if (Math.random() > 0.55) {
          flashSurprisedFace();
        }
        scheduleBombShake();
      }, 650 + Math.random() * 1900);
    }

    function startSuspenseLoop() {
      suspenseText.textContent = pickRandom(suspenseLines);
      clearInterval(state.suspenseIntervalId);
      state.suspenseIntervalId = setInterval(() => {
        suspenseText.textContent = pickRandom(suspenseLines);
        if (Math.random() > 0.72) {
          flashSurprisedFace();
        }
      }, 1400);
    }

    function startSparkLoop() {
      pulseSpark();
      clearInterval(state.sparkIntervalId);
      state.sparkIntervalId = setInterval(pulseSpark, 180 + Math.random() * 220);
    }

    function clearRunningEffects() {
      clearInterval(state.tickIntervalId);
      clearInterval(state.suspenseIntervalId);
      clearInterval(state.sparkIntervalId);
      clearTimeout(state.finishTimeoutId);
      clearTimeout(state.surpriseTimeoutId);
      clearTimeout(state.shakeTimeoutId);
      state.tickIntervalId = null;
      state.suspenseIntervalId = null;
      state.sparkIntervalId = null;
      state.finishTimeoutId = null;
      state.surpriseTimeoutId = null;
      state.shakeTimeoutId = null;
      bombShell.classList.remove("shake");
      setNormalFace();
    }

    function returnToSetup() {
      state.stopRequested = true;
      clearRunningEffects();
      boomOverlay.classList.remove("active");
      showStage("setup");
    }

    function startGame() {
      const values = validateInputs();
      if (!values) return;

      state.stopRequested = false;
      renderBombSvg();
      renderBoomSvg();
      showStage("play");
      ensureAudioContext();
      state.activeTickIsHigh = true;
      playTick();
      state.tickIntervalId = setInterval(playTick, 520);
      startSuspenseLoop();
      startSparkLoop();
      scheduleBombShake();

      const durationSeconds = randomInt(values.min, values.max);
      state.finishTimeoutId = setTimeout(triggerExplosion, durationSeconds * 1000);
    }

    function triggerExplosion() {
      if (state.stopRequested) return;
      clearRunningEffects();
      showStage("boom");
      boomOverlay.classList.add("active");
      playExplosion();
      setTimeout(() => {
        boomOverlay.classList.remove("active");
        showStage("setup");
      }, 3000);
    }

    [minInput, maxInput].forEach((input) => {
      input.addEventListener("input", validateInputs);
    });
    startButton.addEventListener("click", startGame);
    stopButton.addEventListener("click", returnToSetup);

    createDecor();
    validateInputs();
  </script>
</body>
</html>
